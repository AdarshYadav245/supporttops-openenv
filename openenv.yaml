name: supportops-openenv
description: Enterprise customer support simulation environment

observation:
  ticket_id: string
  customer_message: string
  history: list[string]
  step: int

action:
  classification: string
  priority: string
  response: string
  escalate: boolean
  request_info: boolean

reward:
  type: float
  range: [0, 1]

endpoints:
  reset: /reset
  step: /step
  state: /state

tasks:
  - easy
  - medium
  - hard